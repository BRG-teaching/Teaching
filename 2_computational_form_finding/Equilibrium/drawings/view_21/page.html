            <script>function ggbOnInit() {}

function onClickButton1(){
returnToStart();
fan();

}
function onClickButton2(){
fan();
}
function onClickButton3(){
harp();
}
function onClickButton4(){
semifan();
}

function returnToStart(){
	ggbApplet.setCoords("towerControl2", 20, 0);
	ggbApplet.setCoords("deckControl1", ggbApplet.getXcoord("deckControl"), ggbApplet.getYcoord("deckControl"));
	ggbApplet.setCoords("deckControl2", ggbApplet.getXcoord("deckControl1"+20), ggbApplet.getYcoord("deckControl"));
        ggbApplet.setCoords("tower1", ggbApplet.getXcoord("deckControl"), ggbApplet.getYcoord("deckControl")+10);
	ggbApplet.setCoords("O", 47, 8.6);
}
function fan(){
	var tx = ggbApplet.getXcoord("tower1");
	var ty = ggbApplet.getYcoord("tower1");
	ggbApplet.setCoords("tower2", tx, ty);
	ggbApplet.setCoords("tower3", tx, ty);
}
function harp(){
	var tH2x = ggbApplet.getXcoord("towerH2");
	var tH2y = ggbApplet.getYcoord("towerH2");
	var tH3x = ggbApplet.getXcoord("towerH3");
	var tH3y = ggbApplet.getYcoord("towerH3");
	ggbApplet.setCoords("tower2", tH2x, tH2y);
	ggbApplet.setCoords("tower3", tH3x, tH3y);
}
function semifan(){
	var tSF2x = ggbApplet.getXcoord("towerSF2");
	var tSF2y = ggbApplet.getYcoord("towerSF2");
	var tSF3x = ggbApplet.getXcoord("towerH2");
	var tSF3y = ggbApplet.getYcoord("towerH2");
	ggbApplet.setCoords("tower2", tSF2x, tSF2y);
	ggbApplet.setCoords("tower3", tSF3x, tSF3y);
}

function resetSFD() {
ggbApplet.setValue("scaleForceDiagram",1.5);
}

function resetIF() {
ggbApplet.setValue("scaleInternalForces",0);
}

function resetOffset(){
ggbApplet.setValue("offsetLoads",0);
ggbApplet.setValue("offsetReactionForces",2.5);

                                else {
                                    value = Number(value);
                                    value = value.toFixed(0);
                                }

                                createScaleSlider('#scale-sliders', oname, min, max, step, value);

                            }
                            else if (oname.startsWith('F')) {

                                var temp = Number(step).toString().split('.');

                                if (temp.length == 2) {
                                    value = Number(value);
                                    value = value.toFixed(temp[1].length);
                                }
                                else {
                                    value = Number(value);
                                    value = value.toFixed(0);
                                }

                                createForceSlider('#force-sliders', oname, min, max, step, value);

                            }
                            else if (oname == 'mode') {

                                createModeSlider('#mode-slider', oname, min, max, step, xml);

                            }
                            else if (oname == 'node') {

                                if (condition.length) {
                                    var c = condition[0].getAttribute('showObject');

                                    c = c.replace('≟', '==');
                                    c = c.replace('≥', '>=');

                                    console.log(c)

                                    conditions['node'] = c;
                                }

                                createNodeSlider('#node-slider', oname, min, max, step, xml);

                            }
                            else if (oname == 'step') {

                                if (condition.length) {
                                    var c = condition[0].getAttribute('showObject');

                                    c = c.replace('≟', '==');
                                    c = c.replace('≥', '>=');

                                    conditions['step'] = c;
                                }

                                createStepSlider('#step-slider', oname, min, max, step, value, xml);

                            }
                            else {
                                //
                            }
                        }
                    }
                }

            };

            var createModeSlider = function createModeSlider(container, name, min, max, step, xml) {
                console.log('create slider: ' + name + ', ' + min + ', ' + max + ', ' + step);

                $( '<div class="slider"></div>' ).slider({
                    min    : min,
                    max    : max,
                    step   : step,
                    value  : ggbApplet.getValue(name),
                    slide  : function (event, ui) {

                        // onModeUpdate function

                        ggbApplet.evalCommand( 'mode = ' + ui.value );

                        $( '#mode-slider label' ).text( 'mode = ' + ui.value );

                        if (params0 == 13) {
                            if (ui.value == 0) {

                                $(' #step-slider .slider ').slider('value', 0);
                                $( '#step-slider label' ).text( 'step = 0' );
                            }
                        }
                        else {

                            $(' #step-slider .slider ').slider('value', 0);
                            $( '#step-slider label' ).text( 'step = 0' );
                        }

                        if ('step' in conditions) {

                            ggbApplet.evalCommand('temp = If[' + conditions['step'] + ', 1, 0]');

                            if (ggbApplet.getValue('temp')) {

                                $(' #step-slider ').show();
                            }
                            else {

                                $(' #step-slider ').hide();
                            }

                        }

                        $(' #node-slider .slider ').slider('value', 0);
                        $( '#node-slider label' ).text( 'node = 0' );

                        if ('node' in conditions) {
                            
                            ggbApplet.evalCommand('temp = If[' + conditions['node'] + ', 1, 0]');

                            if (ggbApplet.getValue('temp')) {

                                $(' #node-slider ').show();
                            }
                            else {

                                $(' #node-slider ').hide();
                            }

                        }

                        var elements = xml.getElementsByTagName('javascript');

                        if (elements.length) {
                            var onUpdate = elements[0].getAttribute('onUpdate');

                            if (onUpdate) {
                                try {

                                    eval(onUpdate);
                                }
                                catch (e) {

                                    console.log(e);
                                }
                            }
                        }

                        updateSliders();
                    }

                }).appendTo( container )
                  .wrap( '<div class="slider-container" id="' + name + '"></div>' )
                  .before( '<label>' + name + ' = ' + ggbApplet.getValue( name ) + '</label>' );
            };

            var createStepSlider = function createStepSlider(container, name, min, max, step, value, xml) {
                console.log('create slider: ' + name + ', ' + min + ', ' + max + ', ' + step + ', ' + value);

                $( '<div class="slider"></div>' ).slider({
                    min    : min,
                    max    : max,
                    step   : step,
                    value  : value,
                    slide  : function (event, ui) {

                        ggbApplet.evalCommand( 'step = ' + ui.value );

                        $( '#step-slider label' ).text( 'step = ' + ui.value );

                        var elements = xml.getElementsByTagName('javascript');

                        if (elements.length) {
                            var onUpdate = elements[0].getAttribute('onUpdate');

                            if (onUpdate) {
                                try {
                                    eval(onUpdate);
                                }
                                catch (e) {
                                    console.log(e);
                                }
                            }
                        }
                    }


                }).appendTo( container )
                  .wrap( '<div class="slider-container" id="' + name + '"></div>' )
                  .before( '<label>' + name + ' = ' + value + '</label>' );
            };

            var createNodeSlider = function createNodeSlider(container, name, min, max, step, xml) {
                console.log('create slider: ' + name + ', ' + min + ', ' + max + ', ' + step);

                $( '<div class="slider"></div>' ).slider({
                    min    : min,
                    max    : max,
                    step   : step,
                    value  : ggbApplet.getValue(name),
                    slide  : function (event, ui) {

                        ggbApplet.evalCommand( 'node = ' + ui.value );

                        $( '#node-slider label' ).text( 'node = ' + ui.value );

                        var elements = xml.getElementsByTagName('javascript');

                        if (elements.length) {
                            var onUpdate = elements[0].getAttribute('onUpdate');

                            if (onUpdate) {
                                try {

                                    eval(onUpdate);
                                }
                                catch (e) {

                                    console.log(e);
                                }
                            }
                        }
                    }

                }).appendTo( container )
                  .wrap( '<div class="slider-container" id="' + name + '"></div>' )
                  .before( '<label>' + name + ' = ' + ggbApplet.getValue( name ) + '</label>' );
            };

            var createForceSlider = function createForceSlider(container, name, min, max, step, value) {
                console.log('create slider: ' + name + ', ' + min + ', ' + max + ', ' + step + ', ' + value);

                var parts;

                var slider_label;
                var slider_id;

                parts = name.split('_');

                if (parts.length == 2) {

                    if (parts[1].startsWith('{') && parts[1].endsWith('}')) {

                        parts[1] = parts[1].slice(1, parts[1].length - 1);
                    }

                    slider_label = controls[name]['label'];

                    parts[1] = parts[1].split(',').join('_');

                    slider_id = parts[0] + '_' + parts[1];

                }
                else {
                    slider_label = name;
                    slider_id    = name;
                }

                $( '<div class="slider"></div>' ).slider({
                    min    : min,
                    max    : max,
                    step   : step,
                    value  : value,
                    slide  : function (event, ui) {

                        ggbApplet.setValue( name, ui.value );

                        $( '#' + slider_id + ' > label' ).html( slider_label + ' = ' + ui.value );

                    }

                }).appendTo( container )
                  .wrap( '<div class="slider-container" id="' + slider_id + '" data-ggb-name="' + name + '"></div>' )
                  .before( '<label>' + slider_label + ' = ' + value + '</label>' );
            };

            var createScaleSlider = function createScaleSlider(container, name, min, max, step, value) {
                console.log('create slider: ' + name + ', ' + min + ', ' + max + ', ' + step + ', ' + value);

                var label;

                label = controls[name]['label'];

                $( '<div class="slider"></div>' ).slider({
                    min    : min,
                    max    : max,
                    step   : step,
                    value  : value,
                    slide  : function (event, ui) {

                        ggbApplet.setValue( name, ui.value );

                        $( '#' + name + ' > label' ).html( label + ' = ' + ui.value );

                    }

                }).appendTo( container )
                  .wrap( '<div class="slider-container" id="' + name + '"></div>' )
                  .before( '<label>' + label + ' = ' + value + '</label>' );
            };

            // =================================================================
            // create checkboxes
            // =================================================================

            var createCheckboxes = function createCheckboxes() {
                console.log('create checkboxes');

                var onumber, oname, otype;
                var xml, xmlstring, elements;
                var caption, value;

                onumber = ggbApplet.getObjectNumber();

                for (var i = 0; i < onumber; i++) {

                    oname = ggbApplet.getObjectName(i);
                    otype = ggbApplet.getObjectType(oname);

                    if (oname in controls && otype == 'boolean') {

                        xml = loadXMLString(ggbApplet.getXML(oname));

                        caption = controls[oname]['label'];

                        elements = xml.getElementsByTagName('value');

                        if (elements.length) {

                            value = elements[0].getAttribute('val');
                            value = value == 'false' ? false : true;
                        }
                        else {
                            value = false;
                        }

                        $( '<div class="checkbox">' 
                            + '<input type="checkbox" data-ggb-name="' + oname + '" id="toggle-box-' + oname + '" value="none" ' + (value ? 'checked' : '') + ' />'
                            + '<label for="toggle-box-' + oname + '"></label>' 
                            + '<span class="label">' 
                            + caption
                            + '</span></div>' ).appendTo( '#toggle-boxes' );
                    }
                }

                $( '#toggle-boxes' ).on('change', 'input[type=checkbox]', function() {
                    ggbApplet.setValue($(this).data('ggb-name'), (this.checked ? 1 : 0));
                });

            };

            var createCheckbox = function createCheckbox() {
                console.log('create checkbox: ');
            };


            // =================================================================
            // create buttons
            // =================================================================

            var createButtons = function createButtons() {
                console.log('create buttons');

                $('#buttons').empty();

                var onumber, oname, otype;
                var xml, xmlstring, elements;
                var on_click;
                var caption;

                onumber = ggbApplet.getObjectNumber();

                for (var i = 0; i < onumber; i++) {

                    oname = ggbApplet.getObjectName(i);
                    otype = ggbApplet.getObjectType(oname);

                    if (oname in controls && otype == 'button') {

                        xml = loadXMLString(ggbApplet.getXML(oname));

                        elements = xml.getElementsByTagName('caption');

                        if (elements.length) {
    
                            caption = elements[0].getAttribute('val');                            

                            $('<button data-ggb-name="' + oname + '">' + caption + '</button>').appendTo('#buttons');

                        }

                    }

                }

                $('#buttons').on('click', 'button', function() {

                    var name = $(this).data('ggbName');
                    var elements = loadXMLString(ggbApplet.getXML(name)).getElementsByTagName('javascript');
                    var on_click;

                    if (elements.length) {

                        on_click = elements[0].getAttribute('val');

                        if (on_click) {

                            try {
                                eval(on_click);
                            }
                            catch (e) {
                                console.log(e);
                            }
                        }

                        if (params0 == 35) {
                            updateSliders();
                        }
                        if (params0 == 37) {
                            updateSliders();
                        }
                    }

                });
            };

            // =================================================================
            // =================================================================
            // =================================================================
            // run
            // =================================================================
            // =================================================================
            // =================================================================

            var updateSliders = function updateSliders() {
                $('#scale-sliders .slider-container').each(function(index, element) {
                    var value = ggbApplet.getValue(element.id);
                    var label;

                    label = controls[element.id]['label'];

                    $('#' + element.id + ' > label').html( label + ' = ' + value );
                    $('#' + element.id + ' .slider ').slider('value', value);
                });

                $('#force-sliders .slider-container').each(function(index, el) {
                    var name = $('#' + el.id).data('ggb-name');
                    var value = ggbApplet.getValue(name);
                    var label;

                    label = controls[name]['label'];

                    $('#' + el.id + ' > label').html( label + ' = ' + value );
                    $('#' + el.id + ' .slider ').slider('value', value);
                });
            }

            function ggbOnInit() {

                var xmlstring = ggbApplet.getXML();
                var xml       = loadXMLString(xmlstring);

                console.log(xml);

                if (ggbApplet.exists("positionQ")) {
                    ggbApplet.registerObjectUpdateListener("positionQ", "updateLoads");
                }

                if (ggbApplet.exists("length_q")) {
                    ggbApplet.registerObjectUpdateListener("length_q", "updateLoads");
                }

                if (ggbApplet.exists("positionF_{1}")) {
                    ggbApplet.registerObjectUpdateListener("positionF_{1}", "moveLoad1");
                }

                if (ggbApplet.exists("positionF_{2}")) {
                    ggbApplet.registerObjectUpdateListener("positionF_{2}", "moveLoad2");
                }

                initControls();

                $('.toolbar-menu-toggle').on('click', function() {
                    $(this).closest('.toolbar-menu').siblings().removeClass('open');
                    $(this).closest('.toolbar-menu').toggleClass('open');
                });
            }

            $(function() {
                ggbApplet = document.getElementById('ggbApplet');

            });

        </script>
